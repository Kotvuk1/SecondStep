<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KotvukAI — Панель управления</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060a;--sidebar-bg:rgba(255,255,255,0.03);--sidebar-border:rgba(255,255,255,0.06);
  --text:#e0e0e0;--muted:rgba(255,255,255,0.4);--accent:#6366f1;
  --panel-accent:#6366f1;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex}

/* ───── SIDEBAR ───── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:240px;
  background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  transform:translateX(-100%);
}
.sidebar.open{transform:translateX(0)}
.sidebar-header{padding:24px 20px 20px;display:flex;align-items:center;gap:10px;}
.sidebar-logo{
  font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:700;
  color:#fff;letter-spacing:-0.03em;display:flex;align-items:center;gap:8px;
}
.sidebar-logo .bolt{font-size:1.1rem;filter:drop-shadow(0 0 6px rgba(99,102,241,.6))}
.sidebar-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:2px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;
  cursor:pointer;transition:all .2s;color:var(--muted);text-decoration:none;
  font-size:.9rem;font-weight:500;position:relative;white-space:nowrap;
}

.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,0.12);color:#a5b4fc}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0;
}
.nav-item svg{width:20px;height:20px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}





.menu-toggle{
  position:fixed;top:16px;left:16px;z-index:300;
  display:flex;
  width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(6,6,10,0.9);color:var(--muted);cursor:pointer;
  align-items:center;justify-content:center;
  transition:background .2s, border-color .2s, color .2s, left .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(8px);
}
.menu-toggle.open{left:256px}
.menu-toggle:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:var(--text)}
.menu-toggle svg{width:18px;height:18px}


/* ───── MAIN ───── */
.main{margin-left:0;flex:1;height:100vh;overflow-y:auto;position:relative}

/* ───── PANEL CONTENT ───── */
.panel{
  display:none;width:100%;min-height:100vh;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#panel-settings{overflow-y:auto;overflow-x:hidden;}
.panel.active{display:flex}

/* Background grid */
.panel::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 20%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 20%,transparent 70%);
  pointer-events:none;
}

/* Floating orbs */
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;
  animation:orbFloat 8s ease-in-out infinite;
  pointer-events:none;
}
.orb-1{width:300px;height:300px;top:10%;left:20%;animation-delay:0s}
.orb-2{width:250px;height:250px;bottom:15%;right:15%;animation-delay:-3s}
.orb-3{width:200px;height:200px;top:50%;left:60%;animation-delay:-5s}

@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.1)}
  66%{transform:translate(-20px,30px) scale(.9)}
}

/* Center content */
.panel-content{
  position:relative;z-index:2;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}

/* Icon container with rings */
.icon-wrap{
  position:relative;width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
}
.icon-wrap svg{width:48px;height:48px;position:relative;z-index:2}
.ring{
  position:absolute;border-radius:50%;
  border:1.5px solid currentColor;opacity:.15;
}
.ring-1{width:80px;height:80px;animation:ringPulse 3s ease-in-out infinite}
.ring-2{width:105px;height:105px;animation:ringPulse 3s ease-in-out infinite .5s}
.ring-3{width:120px;height:120px;animation:ringPulse 3s ease-in-out infinite 1s;opacity:.08}

@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:.15}
  50%{transform:scale(1.08);opacity:.25}
}

.icon-glow{
  position:absolute;width:60px;height:60px;border-radius:50%;
  filter:blur(25px);opacity:.3;animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:.2;transform:scale(1)}
  50%{opacity:.45;transform:scale(1.15)}
}

.panel-title{
  font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;
  color:#fff;letter-spacing:-0.02em;
}
.panel-subtitle{font-size:.95rem;color:var(--muted);margin-top:-8px}

/* Loading dots */
.loading-dots{display:flex;gap:6px;margin-top:4px}
.loading-dots span{
  width:6px;height:6px;border-radius:50%;opacity:.3;
  animation:dotBounce 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{
  0%,80%,100%{opacity:.3;transform:scale(1)}
  40%{opacity:1;transform:scale(1.4)}
}

/* Status badge */
.status-badge{
  margin-top:8px;padding:6px 16px;border-radius:20px;font-size:.78rem;
  font-weight:500;letter-spacing:.02em;
  border:1px solid;
}

/* Floating particles */
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{
  position:absolute;width:3px;height:3px;border-radius:50%;opacity:0;
  animation:particleDrift 6s linear infinite;
}
@keyframes particleDrift{
  0%{opacity:0;transform:translateY(0) translateX(0)}
  10%{opacity:.4}
  90%{opacity:.4}
  100%{opacity:0;transform:translateY(-120px) translateX(30px)}
}


.sidebar-settings{
  padding:10px;border-top:1px solid rgba(255,255,255,0.06);
}

/* ───── MOBILE ───── */

.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;
}
.sidebar-overlay.open{display:block}

/* ───── SETTINGS PANEL ───── */
#panel-settings {
  align-items: flex-start !important;
  justify-content: center !important;
  padding: 48px 24px;
}
#panel-settings.active {
  display: block;
  overflow-y: auto;
}
#panel-settings .settings-container {
  position: relative;
  z-index: 10;
}
.settings-container {
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.settings-avatar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 32px 0;
}
.settings-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  border: 2px solid rgba(255,255,255,0.1);
  transition: border-color 0.2s;
}
.settings-avatar:hover {
  border-color: #6366f1;
}
.settings-avatar-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  padding: 8px 20px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.settings-avatar-btn:hover {
  border-color: #6366f1;
  color: #e0e0e0;
}
.settings-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 24px;
}
.settings-card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: #fff;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}
.settings-field {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
}
.settings-field:last-child {
  margin-bottom: 0;
}
.settings-label {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.5);
  margin-bottom: 6px;
  font-weight: 500;
}
.settings-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 16px;
  color: #e0e0e0;
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}
.settings-input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}
.settings-input::placeholder {
  color: rgba(255,255,255,0.25);
}
.settings-theme-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.settings-theme-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s;
  text-align: center;
}
.settings-theme-card:hover {
  border-color: rgba(99,102,241,0.4);
}
.settings-theme-card.active {
  border-color: #6366f1;
  box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
}
.settings-theme-preview {
  width: 100%;
  height: 70px;
  border-radius: 8px;
  margin-bottom: 10px;
  overflow: hidden;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.settings-theme-preview-dark {
  background: #0a0a10;
  border: 1px solid rgba(255,255,255,0.08);
}
.settings-theme-preview-dark .preview-bar {
  background: rgba(255,255,255,0.08);
  height: 6px;
  border-radius: 3px;
}
.settings-theme-preview-dark .preview-bar-short {
  width: 60%;
}
.settings-theme-preview-dark .preview-bar-accent {
  background: rgba(99,102,241,0.3);
  width: 40%;
}
.settings-theme-preview-light {
  background: #e8e8ec;
  border: 1px solid rgba(0,0,0,0.08);
}
.settings-theme-preview-light .preview-bar {
  background: rgba(0,0,0,0.1);
  height: 6px;
  border-radius: 3px;
}
.settings-theme-preview-light .preview-bar-short {
  width: 60%;
}
.settings-theme-preview-light .preview-bar-accent {
  background: rgba(99,102,241,0.4);
  width: 40%;
}
.settings-theme-label {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
}
.settings-theme-card.active .settings-theme-label {
  color: #e0e0e0;
}
.settings-lang-options {
  display: flex;
  gap: 8px;
}
.settings-lang-btn {
  flex: 1;
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.5);
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.settings-lang-btn:hover {
  border-color: rgba(99,102,241,0.4);
  color: #e0e0e0;
}
.settings-lang-btn.active {
  background: #6366f1;
  border-color: #6366f1;
  color: #fff;
}
.settings-save-btn {
  width: 100%;
  padding: 14px 24px;
  border-radius: 12px;
  border: none;
  background: #6366f1;
  color: #fff;
  font-size: 1rem;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}
.settings-save-btn:hover {
  background: #818cf8;
}

/* ───── TRADES PANEL ───── */
#panel-trades { overflow-y: auto; align-items: flex-start !important; justify-content: flex-start !important; }
#panel-trades.active { display: block; }
#panel-trades .trades-container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 32px 24px 48px; }
.trades-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
.trades-stat-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 18px 16px; text-align: center;
}
.trades-stat-value {
  font-family: 'Space Grotesk', sans-serif; font-size: 1.55rem; font-weight: 700; color: #fff;
}
.trades-stat-label { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 2px; }

.trades-section-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 600;
  color: #fff; margin-bottom: 14px; letter-spacing: -0.02em;
}

/* Form */
.trades-form-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 22px; margin-bottom: 28px;
}
.trades-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.trades-form-field { display: flex; flex-direction: column; }
.trades-form-field.full-width { grid-column: 1 / -1; }
.trades-form-label { font-size: 0.8rem; color: rgba(255,255,255,0.45); margin-bottom: 5px; font-weight: 500; }
.trades-form-input, .trades-form-select {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 10px 14px; color: #e0e0e0; font-size: 0.88rem;
  font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
  width: 100%;
}
.trades-form-input:focus, .trades-form-select:focus { border-color: #6366f1; }
.trades-form-select option { background: #12121a; color: #e0e0e0; }

/* Pair selector with search */
.pair-selector { position: relative; }
.pair-selected {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 8px; cursor: pointer;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: #e0e0e0; font-size: 0.9rem; font-weight: 500;
  transition: border-color .2s;
}
.pair-selected:hover { border-color: rgba(99,102,241,0.5); }
.pair-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 200;
  background: #12121a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-height: 280px; display: flex; flex-direction: column;
}
.pair-search {
  width: 100%; padding: 8px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: #e0e0e0; font-size: 0.85rem; outline: none;
}
.pair-search:focus { border-color: #6366f1; }
.pair-search::placeholder { color: rgba(255,255,255,0.3); }
.pair-list { overflow-y: auto; flex: 1; }
.pair-item {
  padding: 9px 14px; cursor: pointer; font-size: 0.88rem;
  color: rgba(255,255,255,0.75); transition: background .15s;
}
.pair-item:hover { background: rgba(99,102,241,0.12); color: #fff; }
.pair-item.active { background: rgba(99,102,241,0.18); color: #a5b4fc; font-weight: 600; }

/* Toggle buttons (direction + order type) */
.trades-toggle { display: flex; gap: 8px; }
.trades-toggle-btn {
  flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03); font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
  color: rgba(255,255,255,0.4);
}
.trades-toggle-btn.active { background: rgba(99,102,241,0.15); border-color: #6366f1; color: #a5b4fc; }

/* Direction toggle */
.trades-direction-toggle { display: flex; gap: 8px; }
.trades-dir-btn {
  flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03); font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
}
.trades-dir-btn.long { color: rgba(34,197,94,0.6); }
.trades-dir-btn.long.active { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
.trades-dir-btn.short { color: rgba(239,68,68,0.6); }
.trades-dir-btn.short.active { background: rgba(239,68,68,0.15); border-color: #ef4444; color: #ef4444; }

/* Leverage slider */
.trades-leverage-wrap { display: flex; flex-direction: column; gap: 6px; }
.trades-leverage-header { display: flex; justify-content: space-between; align-items: center; }
.trades-leverage-value {
  font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700; color: #fff;
  background: rgba(99,102,241,0.15); padding: 2px 10px; border-radius: 6px; color: #a5b4fc;
}
.trades-leverage-slider {
  -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
  background: rgba(255,255,255,0.08); border-radius: 3px; outline: none;
  cursor: pointer;
}
.trades-leverage-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
  background: #6366f1; border-radius: 50%; cursor: pointer;
  box-shadow: 0 0 8px rgba(99,102,241,0.5); transition: box-shadow 0.2s;
}
.trades-leverage-slider::-webkit-slider-thumb:hover { box-shadow: 0 0 14px rgba(99,102,241,0.7); }
.trades-leverage-slider::-moz-range-thumb {
  width: 20px; height: 20px; background: #6366f1; border-radius: 50%;
  border: none; cursor: pointer; box-shadow: 0 0 8px rgba(99,102,241,0.5);
}
.trades-leverage-marks {
  display: flex; justify-content: space-between; padding: 0 2px;
}
.trades-leverage-marks span {
  font-size: 0.68rem; color: rgba(255,255,255,0.25); cursor: pointer; transition: color 0.2s;
}
.trades-leverage-marks span:hover { color: rgba(255,255,255,0.6); }

/* Entry price disabled state */
.trades-form-input:disabled {
  opacity: 0.5; cursor: not-allowed; background: rgba(255,255,255,0.02);
}
.trades-market-hint {
  font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 3px; font-style: italic;
}

/* Open trade button — dynamic color */
.trades-open-btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  color: #fff; font-size: 0.95rem; font-family: 'Inter', sans-serif;
  font-weight: 600; cursor: pointer; transition: all 0.25s; margin-top: 6px;
}
.trades-open-btn.btn-long { background: #22c55e; }
.trades-open-btn.btn-long:hover { background: #16a34a; }
.trades-open-btn.btn-short { background: #ef4444; }
.trades-open-btn.btn-short:hover { background: #dc2626; }

/* Order type toggle buttons */
.trades-order-btn {
  flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03); font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
  color: rgba(255,255,255,0.4);
}
.trades-order-btn.active { background: rgba(99,102,241,0.15); border-color: #6366f1; color: #a5b4fc; }

/* Leverage range slider */
.trades-lever-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  outline: none;
  margin: 8px 0;
}
.trades-lever-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #6366f1;
  cursor: pointer;
  box-shadow: 0 0 8px rgba(99,102,241,0.5);
}
.trades-lever-slider::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #6366f1;
  cursor: pointer;
  border: none;
  box-shadow: 0 0 8px rgba(99,102,241,0.5);
}
.trades-lever-marks {
  display: flex; justify-content: space-between; padding: 0 2px;
}

let currentLang = localStorage.getItem('lang') || 'ru';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  const dict = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) {
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = dict[key];
      } else {
        el.textContent = dict[key];
      }
    }
  });
}

function showToast(msg, type) {
  type = type || 'success';
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function createParticles(count, colorRgb) {
  let html = '<div class="particles">';
  for (let i = 0; i < count; i++) {
    const x = Math.random() * 100;
    const y = 30 + Math.random() * 60;
    const delay = Math.random() * 6;
    const size = 2 + Math.random() * 3;
    html += '<div class="particle" style="left:'+x+'%;top:'+y+'%;width:'+size+'px;height:'+size+'px;background:rgba('+colorRgb+',0.5);animation-delay:'+delay+'s"></div>';
  }
  html += '</div>';
  return html;
}

function navigate(hash) {
  const id = (hash || '#dashboard').replace('#','');
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  const panel = document.getElementById('panel-' + id);
  const navItem = document.querySelector('.nav-item[data-panel="'+id+'"]');
  if (panel) panel.classList.add('active');
  if (navItem) navItem.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('menuToggle').classList.remove('open');
}

var avatarModal = document.getElementById('avatarModal');
var avatarInput = document.getElementById('avatarInput');
var modalAvatarPreview = document.getElementById('modalAvatarPreview');
var modalUploadZone = document.getElementById('modalUploadZone');
var avatarModalClose = document.getElementById('avatarModalClose');
var avatarModalCancel = document.getElementById('avatarModalCancel');
var avatarModalSave = document.getElementById('avatarModalSave');
var pendingAvatarBase64 = null;

function openAvatarModal() {
  pendingAvatarBase64 = null;
  var savedAvatar = localStorage.getItem('avatar');
  if (savedAvatar) {
    modalAvatarPreview.textContent = '';
    modalAvatarPreview.style.backgroundImage = 'url(' + savedAvatar + ')';
  } else {
    modalAvatarPreview.textContent = 'KA';
    modalAvatarPreview.style.backgroundImage = '';
  }
  avatarModal.classList.add('open');
}

function closeAvatarModal() {
  avatarModal.classList.remove('open');
  avatarInput.value = '';
  pendingAvatarBase64 = null;
}

document.getElementById('avatarBtn').addEventListener('click', function() {
  openAvatarModal();
});
document.getElementById('settingsAvatar').addEventListener('click', function() {
  openAvatarModal();
});

modalUploadZone.addEventListener('click', function() {
  avatarInput.click();
});

modalUploadZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  modalUploadZone.style.borderColor = '#6366f1';
  modalUploadZone.style.background = 'rgba(99,102,241,0.05)';
});
modalUploadZone.addEventListener('dragleave', function() {
  modalUploadZone.style.borderColor = '';
  modalUploadZone.style.background = '';
});
modalUploadZone.addEventListener('drop', function(e) {
  e.preventDefault();
  modalUploadZone.style.borderColor = '';
  modalUploadZone.style.background = '';
  var file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    handleAvatarFile(file);
  }
});

avatarInput.addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  handleAvatarFile(file);
});

function handleAvatarFile(file) {
  if (file.size > 5 * 1024 * 1024) {
    showToast('Файл слишком большой (макс. 5MB)', 'error');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(ev) {
    pendingAvatarBase64 = ev.target.result;
    modalAvatarPreview.textContent = '';
    modalAvatarPreview.style.backgroundImage = 'url(' + pendingAvatarBase64 + ')';
  };
  reader.readAsDataURL(file);
}

avatarModalClose.addEventListener('click', closeAvatarModal);
avatarModalCancel.addEventListener('click', closeAvatarModal);

avatarModal.addEventListener('click', function(e) {
  if (e.target === avatarModal) {
    closeAvatarModal();
  }
});

avatarModalSave.addEventListener('click', function() {
  if (pendingAvatarBase64) {
    localStorage.setItem('avatar', pendingAvatarBase64);
    applyAvatar(pendingAvatarBase64);
  }
  closeAvatarModal();
});

function applyAvatar(base64) {
  var el = document.getElementById('settingsAvatar');
  if (el && base64) {
    el.textContent = '';
    el.style.backgroundImage = 'url(' + base64 + ')';
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
  }
}

/* ───── TRADES FUNCTIONS ───── */
var pendingOrders = [];
var editTarget = null;
var accountBalance = parseFloat(localStorage.getItem('accountBalance')) || 5000; // { type: 'position'|'pending', row: DOMElement|null, orderId: number|null }
var tradeDirection = 'long';
var tradeOrderType = 'market';
var marketPrices = {};
var allPairs = [];
var topPairs = [];
var binanceSymbols = [];
var symbolMap = {};

function formatPrice(p) {
  if (!p || isNaN(p)) return '0.00';
  if (p >= 1000) return p.toFixed(2);
  if (p >= 1)    return p.toFixed(4);
  if (p >= 0.01) return p.toFixed(5);
  return p.toFixed(8);
}

function updateMarketPrice() {
  // Only update DOM if trades panel is active
  var tradesPanel = document.getElementById('panel-trades');
  var isPanelActive = tradesPanel && tradesPanel.classList.contains('active');

  // If market order selected — keep entry price field in sync
  if (isPanelActive && tradeOrderType === 'market') {
    var pairEl = document.getElementById('tradePair');
    var entryInput = document.getElementById('tradeEntry');
    if (pairEl && entryInput && pairEl.value) {
      var livePrice = marketPrices[pairEl.value] || 0;
      if (livePrice > 0) entryInput.value = formatPrice(livePrice);
    }
  }

  // Update open positions table
  var tbody = document.getElementById('openPositionsBody');
  if (!tbody || !isPanelActive) return;
  var rows = tbody.querySelectorAll('tr');
  rows.forEach(function(row) {
    var cells = row.querySelectorAll('td');
    if (cells.length < 6) return;
    var pair = cells[0].textContent.trim();
    var currentPrice = marketPrices[pair];
    if (!currentPrice) return;
    cells[4].textContent = '$' + formatPrice(currentPrice);
    var entryText = cells[3].textContent.replace('$','').replace(/,/g,'').trim();
    var entryPrice = parseFloat(entryText);
    if (isNaN(entryPrice) || entryPrice === 0) return;
    var dirText = cells[1].textContent.trim();
    var pnlRaw = dirText === 'LONG' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
    var pnlPct = ((pnlRaw / entryPrice) * 100).toFixed(2);
    var pnlFormatted = (pnlRaw >= 0 ? '+' : '') + '$' + Math.abs(pnlRaw).toFixed(2) + ' (' + (pnlRaw >= 0 ? '+' : '') + pnlPct + '%)';
    var pnlClass = pnlRaw >= 0 ? 'trades-pnl-pos' : 'trades-pnl-neg';
    cells[5].innerHTML = '<span class="' + pnlClass + '">' + pnlFormatted + '</span>';
  });
  if (tbody.querySelectorAll('.trades-close-btn').length > 0) {
    updateStats();
  }
}

function initTradesPanel() {
  // Order type toggle — enable/disable entry price
  document.querySelectorAll('.trades-order-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.trades-order-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      tradeOrderType = this.dataset.order;
      var isMarket = tradeOrderType === 'market';
      var entryInput = document.getElementById('tradeEntry');
      if (isMarket) {
        entryInput.disabled = true;
        entryInput.style.opacity = '0.6';
        var selectedPair = document.getElementById('tradePair');
        var currentMktPrice = selectedPair ? (marketPrices[selectedPair.value] || 0) : 0;
        entryInput.value = currentMktPrice > 0 ? currentMktPrice.toFixed(currentMktPrice < 1 ? 4 : 2) : '';
        entryInput.placeholder = '';
      } else {
        entryInput.disabled = false;
        entryInput.value = '';
        entryInput.placeholder = 'Введите цену';
        entryInput.style.opacity = '1';
      }
    });
  });

  // Direction toggle — change button color
  document.querySelectorAll('.trades-dir-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.trades-dir-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      tradeDirection = this.dataset.dir;
      var submitBtn = document.getElementById('tradeSubmitBtn');
      if (tradeDirection === 'long') {
        submitBtn.style.background = '#22c55e';
        submitBtn.textContent = 'Открыть LONG';
      } else {
        submitBtn.style.background = '#ef4444';
        submitBtn.textContent = 'Открыть SHORT';
      }
    });
  });

  // Leverage slider
  var leverageSlider = document.getElementById('tradeLeverage');
  if (leverageSlider) {
    leverageSlider.addEventListener('input', function() {
      document.getElementById('leverageValue').textContent = this.value + 'x';
    });
  }

  // Set initial market price on load
  (function() {
    var pairEl = document.getElementById('tradePair');
    var entryInput = document.getElementById('tradeEntry');
    if (pairEl && entryInput && tradeOrderType === 'market') {
      var livePrice = marketPrices[pairEl.value] || 0;
      if (livePrice > 0) entryInput.value = formatPrice(livePrice);
    }
  })();
}

function setAmountPreset(val) {
  var input = document.getElementById('tradeAmount');
  if (input) input.value = val;
}

function openTrade() {
  var pair = document.getElementById('tradePair');
  var entry = document.getElementById('tradeEntry');
  var sl = document.getElementById('tradeSL');
  var tp = document.getElementById('tradeTP');
  var leverage = document.getElementById('tradeLeverage');
  var amountEl = document.getElementById('tradeAmount');

  var pairVal = pair ? pair.value : '';
  if (!pairVal) {
    showToast('Выберите пару', 'error');
    return;
  }

  var amount = amountEl ? parseFloat(amountEl.value) : 0;
  if (!amount || amount <= 0) {
    showToast('Укажите сумму сделки', 'error');
    return;
  }

  if (tradeOrderType === 'market') {
    pairVal = pair ? pair.value : 'BTC/USDT';
    var marketPrice = marketPrices[pairVal] || 0;
    if (marketPrice === 0) {
      showToast('Нет рыночной цены', 'error');
      return;
    }
    var dir = tradeDirection === 'long' ? 'LONG' : 'SHORT';
    var lev = leverage ? leverage.value + 'x' : '10x';
    var tpVal = tp ? tp.value : '';
    var slVal = sl ? sl.value : '';
    if (amount > accountBalance) {
      showToast('Недостаточно средств. Баланс: $' + accountBalance.toFixed(2), 'error');
      return;
    }
    accountBalance -= amount;
    updateBalanceDisplay();
    addOpenPosition(pairVal, dir, marketPrice, tpVal, slVal, lev, amount);
    showToast(dir + ' ' + pairVal + ' $' + amount + ' @ $' + marketPrice.toFixed(2) + ' (' + lev + ') — сделка открыта!', 'success');
    if (sl) sl.value = '';
    if (tp) tp.value = '';
    if (amountEl) amountEl.value = '';
    return;
  }

  // Limit order
  if (!entry || !entry.value) {
    showToast('Укажите точку входа', 'error');
    return;
  }

  var dir = tradeDirection === 'long' ? 'LONG' : 'SHORT';
  var lev = leverage ? leverage.value + 'x' : '10x';
  var entryVal = parseFloat(entry.value);
  var tpVal = tp ? tp.value : '';
  var slVal = sl ? sl.value : '';

  if (isNaN(entryVal) || entryVal <= 0) {
    showToast('Укажите корректную цену входа', 'error');
    return;
  }

  // Validate limit price direction
  var currentMkt = marketPrices[pairVal] || 0;
  if (currentMkt > 0) {
    if (dir === 'LONG' && entryVal >= currentMkt) {
      showToast('Для LONG лимит должен быть ниже текущей цены (' + formatPrice(currentMkt) + ')', 'error');
      return;
    }
    if (dir === 'SHORT' && entryVal <= currentMkt) {
      showToast('Для SHORT лимит должен быть выше текущей цены (' + formatPrice(currentMkt) + ')', 'error');
      return;
    }
  }

  var order = {
    id: Date.now(),
    pair: pairVal,
    dir: dir,
    entryPrice: entryVal,
    tp: tpVal,
    sl: slVal,
    leverage: lev,
    amount: amount,
    placedAt: Date.now()
  };
  if (amount > accountBalance) {
    showToast('Недостаточно средств. Баланс: $' + accountBalance.toFixed(2), 'error');
    return;
  }
  accountBalance -= amount;
  updateBalanceDisplay();
  pendingOrders.push(order);
  renderPendingOrders();
  showToast('Лимитный ордер $' + amount + ' выставлен @ $' + entry.value, 'success');

  if (sl) sl.value = '';
  if (tp) tp.value = '';
  if (amountEl) amountEl.value = '';
  entry.value = '';
}

function updateBalanceDisplay() {
  localStorage.setItem('accountBalance', accountBalance.toFixed(2));
  var el = document.getElementById('statBalance');
  if (el) el.textContent = '$' + accountBalance.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function updateStats() {
  var posBody = document.getElementById('openPositionsBody');
  var histBody = document.getElementById('tradesHistoryBody');

  // Count open positions
  var openRows = posBody ? posBody.querySelectorAll('tr[data-pos]').length : 0;
  // fallback: count rows that have a close button
  if (posBody) {
    openRows = posBody.querySelectorAll('.trades-close-btn').length;
  }
  var statPos = document.getElementById('statPositions');
  if (statPos) statPos.textContent = openRows;

  // P&L today — sum from open positions
  var totalPnl = 0;
  if (posBody) {
    posBody.querySelectorAll('tr').forEach(function(row) {
      var pnlCell = row.querySelectorAll('td')[5];
      if (pnlCell) {
        var txt = pnlCell.textContent.replace(/[+$,%()]/g, '').trim().split(' ')[0];
        var val = parseFloat(txt);
        if (!isNaN(val)) totalPnl += val;
      }
    });
  }
  var statPnl = document.getElementById('statPnl');
  if (statPnl) {
    statPnl.textContent = (totalPnl >= 0 ? '+' : '') + '$' + Math.abs(totalPnl).toFixed(2);
    statPnl.style.color = totalPnl >= 0 ? '#22c55e' : '#ef4444';
  }

  // Win rate & total trades from history
  var wins = 0, total = 0;
  if (histBody) {
    histBody.querySelectorAll('tr').forEach(function(row) {
      var pnlCell = row.querySelectorAll('td')[2];
      if (pnlCell && pnlCell.textContent.trim() && pnlCell.textContent !== 'История пуста') {
        total++;
        if (pnlCell.textContent.indexOf('+') !== -1) wins++;
      }
    });
  }
  var statWR = document.getElementById('statWinRate');
  if (statWR) statWR.textContent = total > 0 ? ((wins / total) * 100).toFixed(1) + '%' : '—';
  var statT = document.getElementById('statTrades');
  if (statT) statT.textContent = total;
}

function addOpenPosition(pair, dir, entryPrice, tp, sl, leverage, amount) {
  var tbody = document.getElementById('openPositionsBody');
  if (!tbody) return;
  entryPrice = parseFloat(entryPrice) || 0;
  var currentPrice = marketPrices[pair] || entryPrice;
  var pnlRaw = dir === 'LONG' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
  var pnlPct = entryPrice > 0 ? ((pnlRaw / entryPrice) * 100).toFixed(2) : '0.00';
  var pnlFormatted = (pnlRaw >= 0 ? '+' : '') + '$' + Math.abs(pnlRaw).toFixed(2) + ' (' + (pnlRaw >= 0 ? '+' : '') + pnlPct + '%)';
  var pnlClass = pnlRaw >= 0 ? 'trades-pnl-pos' : 'trades-pnl-neg';
  var badgeClass = dir === 'LONG' ? 'trades-badge-long' : 'trades-badge-short';
  var row = document.createElement('tr');
  var amountStr = amount ? '$' + parseFloat(amount).toFixed(2) : '—';
  row.innerHTML = '<td style="font-weight:600">' + pair + '</td>'
    + '<td><span class="' + badgeClass + '">' + dir + '</span></td>'
    + '<td>' + amountStr + '</td>'
    + '<td>$' + formatPrice(entryPrice) + '</td>'
    + '<td>$' + formatPrice(currentPrice) + '</td>'
    + '<td><span class="' + pnlClass + '">' + pnlFormatted + '</span></td>'
    + '<td>' + (sl || '—') + '</td>'
    + '<td>' + (tp || '—') + '</td>'
    + '<td style="display:flex;gap:6px;"><button class="trades-edit-btn" onclick="openEditModal(this,\'position\')">Изменить</button><button class="trades-close-btn" onclick="closeTrade(this)">Закрыть</button></td>';
  // Remove "no positions" placeholder row if present
  var placeholder = tbody.querySelector('td[colspan]');
  if (placeholder) placeholder.closest('tr').remove();
  tbody.appendChild(row);
  row.classList.add('row-flash');
  updateStats();
}

function timeAgo(ts) {
  if (!ts) return '—';
  var diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return diff + 'с';
  if (diff < 3600) return Math.floor(diff / 60) + 'м';
  return Math.floor(diff / 3600) + 'ч';
}

function renderPendingOrders() {
  var container = document.getElementById('pendingOrdersList');
  if (!container) return;
  if (pendingOrders.length === 0) {
    container.innerHTML = '<tr><td colspan="10" style="text-align:center;color:rgba(255,255,255,0.3);padding:20px">Нет ожидающих ордеров</td></tr>';
    return;
  }
  container.innerHTML = pendingOrders.map(function(o) {
    var badgeClass = o.dir === 'LONG' ? 'trades-badge-long' : 'trades-badge-short';
    var amountStr = o.amount ? '$' + parseFloat(o.amount).toFixed(2) : '—';
    var currentPriceForOrder = marketPrices[o.pair] || 0;
    var priceInfo = currentPriceForOrder > 0
      ? '$' + formatPrice(o.entryPrice) + '<br><span style="font-size:0.75rem;color:rgba(255,255,255,0.35)">сейчас: $' + formatPrice(currentPriceForOrder) + '</span>'
      : '$' + formatPrice(o.entryPrice);
    return '<tr data-order-id="' + o.id + '" data-pair="' + o.pair + '">'
      + '<td style="font-weight:600">' + o.pair + '</td>'
      + '<td><span class="' + badgeClass + '">' + o.dir + '</span></td>'
      + '<td>Лимитный</td>'
      + '<td style="color:rgba(255,255,255,0.5)">' + amountStr + ' <span style="font-size:0.7rem;color:rgba(255,158,11,0.7)">резерв</span></td>'
      + '<td>' + priceInfo + '</td>'
      + '<td>' + (o.tp || '—') + '</td>'
      + '<td>' + (o.sl || '—') + '</td>'
      + '<td>' + o.leverage + '</td>'
      + '<td style="color:rgba(255,255,255,0.35)">' + timeAgo(o.placedAt) + '</td>'
      + '<td style="display:flex;gap:6px;"><button class="trades-edit-btn" onclick="openEditModal(this,\'pending\',' + o.id + ')">Изменить</button><button class="trades-close-btn" onclick="cancelOrder(' + o.id + ')">Отменить</button></td>'
      + '</tr>';
  }).join('');
}

function cancelOrder(id) {
  var order = pendingOrders.find(function(o) { return o.id === id; });
  if (order && order.amount) {
    accountBalance += parseFloat(order.amount);
    updateBalanceDisplay();
  }
  pendingOrders = pendingOrders.filter(function(o) { return o.id !== id; });
  renderPendingOrders();
  showToast('Ордер отменён', 'success');
}

function closeTrade(btn) {
  var row = btn.closest('tr');
  if (row) {
    // Extract data for history
    var cells = row.querySelectorAll('td');
    var pair = cells[0] ? cells[0].textContent : '';
    var dirBadge = cells[1] ? cells[1].innerHTML : '';
    var amountCell = cells[2] ? cells[2].textContent.replace('$','').replace(',','').trim() : '0';
    var pnlCell = cells[5] ? cells[5].textContent : '';
    var pnlHtml = cells[5] ? cells[5].innerHTML : '';
    var today = new Date();
    var dateStr = ('0'+today.getDate()).slice(-2) + '.' + ('0'+(today.getMonth()+1)).slice(-2) + '.' + today.getFullYear();

    // Return amount + P&L to balance
    var amt = parseFloat(amountCell) || 0;
    var pnlMatch = pnlCell.match(/([-+]?\s*\$[\d.,]+)/);
    var pnlVal = 0;
    if (pnlMatch) {
      var raw = pnlMatch[1].replace(/[$,\s]/g, '');
      pnlVal = parseFloat(raw) || 0;
    }
    accountBalance += amt + pnlVal;
    updateBalanceDisplay();

    row.style.transition = 'opacity 0.3s';
    row.style.opacity = '0';
    setTimeout(function() {
      row.remove();
      // Add to history
      var historyBody = document.getElementById('tradesHistoryBody');
      if (historyBody) {
        var newRow = document.createElement('tr');
        newRow.innerHTML = '<td style="font-weight:600">' + pair + '</td>'
          + '<td>' + dirBadge + '</td>'
          + '<td>' + pnlHtml + '</td>'
          + '<td style="color:rgba(255,255,255,0.4)">' + dateStr + '</td>';
        // Remove "history empty" placeholder if present
        var ph = historyBody.querySelector('td[colspan]');
        if (ph) ph.closest('tr').remove();
        historyBody.insertBefore(newRow, historyBody.firstChild);
      }
      updateStats();
    }, 300);
    showToast('Позиция закрыта', 'success');
  }
}

// Real-time prices via Binance WebSocket
// binanceSymbols, symbolMap, allPairs — populated dynamically from exchangeInfo

function checkLimitOrders() {
  var triggered = [];
  pendingOrders.forEach(function(order) {
    var currentPrice = marketPrices[order.pair];
    if (!currentPrice) return;
    var shouldTrigger = order.dir === 'LONG'
      ? currentPrice <= order.entryPrice
      : currentPrice >= order.entryPrice;
    if (shouldTrigger) triggered.push(order);
  });
  triggered.forEach(function(order) {
    pendingOrders = pendingOrders.filter(function(o) { return o.id !== order.id; });
    addOpenPosition(order.pair, order.dir, order.entryPrice, order.tp, order.sl, order.leverage, order.amount);
    showToast('Лимитный ордер исполнен! ' + order.pair + ' ' + order.dir + ' @ $' + formatPrice(order.entryPrice), 'success');
  });
  if (triggered.length > 0) renderPendingOrders();
}

var lastLimitCheck = 0;

// Dedicated interval: check limit orders every 2 seconds regardless of WS activity
setInterval(checkLimitOrders, 2000);

// Refresh pending orders display every 30 seconds (for time-ago updates and live price)
setInterval(function() {
  if (pendingOrders.length > 0) {
    var tradesPanel = document.getElementById('panel-trades');
    if (tradesPanel && tradesPanel.classList.contains('active')) {
      renderPendingOrders();
    }
  }
}, 30000);

function createWS(symbols) {
  var streams = symbols.map(function(s) { return s + '@miniTicker'; }).join('/');
  var ws = new WebSocket('wss://fstream.binance.com/stream?streams=' + streams);

  ws.onmessage = function(event) {
    try {
      var data = JSON.parse(event.data);
      var tick = data.data || data;
      if (tick && tick.s) {
        var sym = tick.s.toLowerCase();
        var pair = symbolMap[sym];
        if (pair) {
          marketPrices[pair] = parseFloat(tick.c);
          updateMarketPrice();
          var now = Date.now();
          if (now - lastLimitCheck > 1000) {
            lastLimitCheck = now;
            checkLimitOrders();
          }
        }
      }
    } catch(e) {}
  };

  ws.onclose = function() {
    setTimeout(function() { createWS(symbols); }, 3000);
  };
  ws.onerror = function() { ws.close(); };
  return ws;
}

function connectBinanceWS() {
  // Split into chunks of 150 streams per connection (Binance limit: 200)
  var chunkSize = 150;
  for (var i = 0; i < binanceSymbols.length; i += chunkSize) {
    createWS(binanceSymbols.slice(i, i + chunkSize));
  }
}

// Fetch initial prices via REST, then connect WebSocket
/* ── Pair selector ── */
var selectedPairValue = '';

function togglePairDropdown() {
  var dd = document.getElementById('pairDropdown');
  var search = document.getElementById('pairSearch');
  if (!dd) return;
  var isOpen = dd.style.display !== 'none';
  dd.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen && search) { search.value = ''; filterPairs(''); setTimeout(function(){ search.focus(); }, 50); }
}

function renderPairItem(p) {
  var cls = 'pair-item' + (p === selectedPairValue ? ' active' : '');
  return '<div class="' + cls + '" onclick="selectPair(\'' + p + '\')">' + p + '</div>';
}

function filterPairs(query) {
  var list = document.getElementById('pairList');
  if (!list) return;
  var q = query.trim().toUpperCase();
  var filtered = q ? allPairs.filter(function(p) { return p.indexOf(q) !== -1; }) : allPairs;
  list.innerHTML = filtered.map(renderPairItem).join('');
}

function selectPairSilent(pair) {
  selectedPairValue = pair;
  var hidden = document.getElementById('tradePair');
  var text = document.getElementById('pairSelectedText');
  if (hidden) hidden.value = pair;
  if (text) { text.textContent = pair; text.style.color = ''; }
}

function selectPair(pair) {
  selectPairSilent(pair);
  var dd = document.getElementById('pairDropdown');
  if (dd) dd.style.display = 'none';
  // Update entry price if market order
  if (typeof tradeOrderType !== 'undefined' && tradeOrderType === 'market') {
    var entryInput = document.getElementById('tradeEntry');
    var livePrice = marketPrices[pair] || 0;
    if (entryInput && livePrice > 0) entryInput.value = formatPrice(livePrice);
  }
}

// Close dropdown on outside click
document.addEventListener('click', function(e) {
  var selector = document.getElementById('pairSelector');
  if (selector && !selector.contains(e.target)) {
    var dd = document.getElementById('pairDropdown');
    if (dd) dd.style.display = 'none';
  }
});

function populatePairDropdown(pairs) {
  var text = document.getElementById('pairSelectedText');
  if (text) text.textContent = 'Выберите пару';
  var hidden = document.getElementById('tradePair');
  if (hidden) hidden.value = '';
  filterPairs('');
}

(function initPrices() {
  var stables = {'USDC':1,'BUSD':1,'TUSD':1,'USDP':1,'DAI':1,'FDUSD':1,'USDS':1,
                 'FRAX':1,'USTC':1,'PAXG':1,'STABLE':1,'STBL':1,'LUNA2':1};

  // Step 1: load all perpetual USDT pairs from Binance Futures
  fetch('https://fapi.binance.com/fapi/v1/exchangeInfo')
    .then(function(r) { return r.json(); })
    .then(function(info) {
      var pairs = [];
      info.symbols.forEach(function(s) {
        if (s.status === 'TRADING' && s.contractType === 'PERPETUAL' && s.symbol.endsWith('USDT')) {
          var base = s.symbol.slice(0, -4);
          if (!stables[base] && !/^[0-9]/.test(base) && /^[A-Z0-9]+$/.test(base) && base.length >= 2 && base.length <= 10) {
            pairs.push(base + '/USDT');
          }
        }
      });
      // Initial sort alphabetical — will re-sort by price after prices load
      pairs.sort();
      allPairs = pairs;

      // Build symbolMap and binanceSymbols
      pairs.forEach(function(p) {
        var sym = p.replace('/', '').toLowerCase();
        symbolMap[sym] = p;
        binanceSymbols.push(sym);
        marketPrices[p] = 0;
      });

      // Populate custom pair dropdown (before top-10 loads)
      populatePairDropdown(pairs);

      // Fetch top-10 by market cap from CoinGecko, filter stablecoins
      var stableSymbols = {'USDT':1,'USDC':1,'BUSD':1,'DAI':1,'TUSD':1,'FDUSD':1,'USDS':1,'USDE':1,'WBTC':1};
      fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1&sparkline=false')
        .then(function(r) { return r.json(); })
        .then(function(coins) {
          var top = [];
          coins.forEach(function(c) {
            if (top.length >= 10) return;
            var sym = c.symbol.toUpperCase();
            if (stableSymbols[sym]) return;
            var pair = sym + '/USDT';
            if (allPairs.indexOf(pair) !== -1) top.push(pair);
          });
          topPairs = top;
        })
        .catch(function() {});

      // Step 2: fetch current prices for all pairs (futures)
      return fetch('https://fapi.binance.com/fapi/v1/ticker/price');
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      data.forEach(function(item) {
        var sym = item.symbol.toLowerCase();
        var pair = symbolMap[sym];
        if (pair) marketPrices[pair] = parseFloat(item.price);
      });

      // Re-sort allPairs by price descending (top by market price first)
      var topSet = {};
      topPairs.forEach(function(p) { topSet[p] = 1; });
      allPairs.sort(function(a, b) {
        var pa = marketPrices[a] || 0;
        var pb = marketPrices[b] || 0;
        return pb - pa;
      });
      // Re-render dropdown with price-sorted order
      filterPairs('');

      updateMarketPrice();
      connectBinanceWS();
    })
    .catch(function(e) {
      // Fallback: connect WS anyway
      connectBinanceWS();
    });
})();
/* ───── EDIT MODAL ───── */
function openEditModal(btn, type, orderId) {
  var modal = document.getElementById('editModal');
  var title = document.getElementById('editModalTitle');
  var entryWrap = document.getElementById('editEntryWrap');
  var editEntry = document.getElementById('editEntry');
  var editTP = document.getElementById('editTP');
  var editSL = document.getElementById('editSL');

  if (type === 'position') {
    var row = btn.closest('tr');
    var cells = row.querySelectorAll('td');
    editTarget = { type: 'position', row: row };
    title.textContent = 'Редактировать позицию — ' + (cells[0] ? cells[0].textContent : '');
    entryWrap.style.display = 'none'; // can't change entry for open position
    editTP.value = cells[7] ? cells[7].textContent.replace('—','').replace('$','').trim() : '';
    editSL.value = cells[6] ? cells[6].textContent.replace('—','').replace('$','').trim() : '';
  } else {
    // pending order
    var order = pendingOrders.find(function(o) { return o.id === orderId; });
    if (!order) return;
    editTarget = { type: 'pending', orderId: orderId };
    title.textContent = 'Редактировать ордер — ' + order.pair;
    entryWrap.style.display = 'block';
    editEntry.value = order.entryPrice || '';
    editTP.value = order.tp || '';
    editSL.value = order.sl || '';
  }

  modal.style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  editTarget = null;
}

function saveEdit() {
  if (!editTarget) return;
  var editEntry = document.getElementById('editEntry');
  var editTP = document.getElementById('editTP');
  var editSL = document.getElementById('editSL');
  var tpVal = editTP.value.trim();
  var slVal = editSL.value.trim();

  if (editTarget.type === 'position') {
    var row = editTarget.row;
    var cells = row.querySelectorAll('td');
    if (cells[6]) cells[6].textContent = slVal ? '$' + slVal : '—';
    if (cells[7]) cells[7].textContent = tpVal ? '$' + tpVal : '—';
  } else {
    var order = pendingOrders.find(function(o) { return o.id === editTarget.orderId; });
    if (order) {
      if (editEntry.value) {
        var newEntry = parseFloat(editEntry.value);
        if (isNaN(newEntry) || newEntry <= 0) {
          showToast('Укажите корректную цену входа', 'error');
          return;
        }
        var currentMkt = marketPrices[order.pair] || 0;
        if (currentMkt > 0) {
          if (order.dir === 'LONG' && newEntry >= currentMkt) {
            showToast('Для LONG лимит должен быть ниже текущей цены', 'error');
            return;
          }
          if (order.dir === 'SHORT' && newEntry <= currentMkt) {
            showToast('Для SHORT лимит должен быть выше текущей цены', 'error');
            return;
          }
        }
        order.entryPrice = newEntry;
      }
      order.tp = tpVal;
      order.sl = slVal;
      renderPendingOrders();
    }
  }

  closeEditModal();
  showToast('Изменения сохранены', 'success');
}

// Close modal on backdrop click (event delegation)
document.addEventListener('click', function(e) {
  var modal = document.getElementById('editModal');
  if (modal && e.target === modal) closeEditModal();
});
